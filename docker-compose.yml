services:
  mongo:
    image: mongo:7
    container_name: futbol-tokens-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try {
            const s = rs.status();
            if (s.ok === 1) quit(0);
          } catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] });
          }
        "
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 5s

volumes:
  mongo-data:
