services:
  mongo:
    image: mongo:7
    container_name: futbol-tokens-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: |
        mongosh --quiet --eval "
          try {
            const s = rs.status();
            if (s.ok === 1) quit(0);
          } catch (e) {
            rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] });
          }
        "
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 5s
    networks:
      - futbol-tokens

  prometheus:
    image: prom/prometheus:latest
    container_name: futbol-tokens-prometheus
    ports:
      - "9096:9090"
    volumes:
      - ./prometheus:/etc/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-admin-api"
    networks:
      - futbol-tokens

  grafana:
    image: grafana/grafana:latest
    container_name: futbol-tokens-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    networks:
      - futbol-tokens

networks:
  futbol-tokens:
    driver: bridge

volumes:
  mongo-data:
